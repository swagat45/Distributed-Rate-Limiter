
name: C++ CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            git \
            libgrpc++-dev \
            protobuf-compiler-grpc \
            libprotobuf-dev \
            libhiredis-dev \
            libcurl4-openssl-dev \
            libssl-dev \
            googletest \
            libgtest-dev
      
      - name: Build Prometheus C++ from source
        run: |
          cd /tmp
          git clone --recurse-submodules https://github.com/jupp0r/prometheus-cpp.git
          cd prometheus-cpp
          
          # Ensure all submodules are properly initialized and updated
          git submodule update --init --recursive
          
          # Create and configure build
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON
          
          # Build with verbose output for debugging
          make -j$(nproc) VERBOSE=1
          sudo make install
          sudo ldconfig
      
      - name: Build Rate Limiter
        run: |
          mkdir build && cd build
          cmake .. && make -j$(nproc)
      
      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure
